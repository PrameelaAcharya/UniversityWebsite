<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apply 2025-26</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#141e30,#243b55);
  overflow:hidden;
}

/* ===== BUBBLES ===== */
.bubbles{
  position:absolute;
  width:100%;
  height:100%;
}

.bubbles span{
  position:absolute;
  bottom:-100px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  animation:rise linear infinite;
}

.bubbles span:nth-child(1){left:10%; width:20px; height:20px; animation-duration:8s;}
.bubbles span:nth-child(2){left:30%; width:30px; height:30px; animation-duration:10s;}
.bubbles span:nth-child(3){left:50%; width:25px; height:25px; animation-duration:12s;}
.bubbles span:nth-child(4){left:70%; width:35px; height:35px; animation-duration:9s;}
.bubbles span:nth-child(5){left:90%; width:15px; height:15px; animation-duration:11s;}

@keyframes rise{
  0%{transform:translateY(0); opacity:0;}
  50%{opacity:1;}
  100%{transform:translateY(-100vh); opacity:0;}
}

/* ===== GLASS CARD ===== */
.container{
  position:relative;
  z-index:1;
  width:420px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.2);
  box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

h2{
  text-align:center;
  color:#fff;
  margin-bottom:25px;
}

/* ===== INPUT ===== */
.input-group{
  position:relative;
  margin-bottom:20px;
}

.input-group input,
.input-group textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.15);
  color:#fff;
}

.input-group textarea{
  height:80px;
}

.input-group input:focus,
.input-group textarea:focus{
  background:rgba(255,255,255,0.25);
  box-shadow:0 0 10px #00eaff;
}

/* Floating label */
.input-group label{
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  color:#ccc;
  transition:0.3s;
}

.input-group input:focus ~ label,
.input-group input:valid ~ label,
.input-group textarea:focus ~ label,
.input-group textarea:valid ~ label{
  top:-8px;
  font-size:10px;
  color:#00eaff;
}

/* ===== BUTTON ===== */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#00eaff,#0072ff);
  color:#fff;
  cursor:pointer;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px #00eaff;
}
</style>
</head>

<body>

<div class="bubbles">
  <span></span><span></span><span></span><span></span><span></span>
</div>

<div class="container">
  <h2>Apply for 2025-26</h2>

  <!-- IMPORTANT FORM -->
  <form id="applyForm">

    <div class="input-group">
      <input type="text" name="name" required>
      <label>Full Name</label>
    </div>

    <div class="input-group">
      <input type="email" name="email" required>
      <label>Email Address</label>
    </div>

    <div class="input-group">
      <input type="text" name="phone" required>
      <label>Phone Number</label>
    </div>

    <div class="input-group">
      <input type="text" name="course" required>
      <label>Course</label>
    </div>

    <div class="input-group">
      <textarea name="address" required></textarea>
      <label>Address</label>
    </div>

    <button type="submit">Submit Application</button>

  </form>
</div>

<!-- JS (VERY IMPORTANT) -->
<script>
const form = document.getElementById("applyForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = {
    name: form.name.value,
    email: form.email.value,
    phone: form.phone.value,
    course: form.course.value,
    address: form.address.value
  };

  console.log("🚀 Sending:", data);

  try {
    const res = await fetch("http://localhost:5000/api/apply", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await res.json();
    alert("✅ Application Submitted!");

  } catch (err) {
    console.log("❌ Error:", err);
    alert("Error submitting form");
  }
});
</script>

</body>
</html>
